# Reverse proxy: single public entrypoint for the security-agent web app.
# Everything goes to the Next.js frontend — including its /api BFF proxy,
# which forwards to the backend internally over the compose network.

upstream frontend_upstream {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Allow large scan reports / prompts through without buffering limits.
    client_max_body_size 10m;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Scans poll for minutes; keep upstream timeouts generous.
        proxy_read_timeout 120s;
    }
}
