# Full-stack bring-up for the security-agent web app.
#
#   cp .env.example .env      # adjust API_KEY if you like
#   docker compose up --build
#   open http://localhost:8080
#
# Topology:
#   nginx  :8080  ──reverse proxy──▶  frontend:3000
#   frontend       ──BFF proxy /api──▶  backend:8000   (API key injected here)
#   backend        FastAPI + bundled agentsec dev stub
#
# The backend image bundles the agentsec *stub*: scans are simulated, need no
# LLM key, and are deterministic — ideal for e2e. AGENTSEC_STUB_BEHAVIOR
# controls the simulated outcome (instant_completed / awaiting_clarify / ...).
# Swap in the real agentsec package for production scanning.

name: security-agent

services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY:-changeme}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-changeme-webhook}
      REPOS_DIR: /data/repos
      AGENTSEC_STUB_BEHAVIOR: ${AGENTSEC_STUB_BEHAVIOR:-instant_completed}
    # Published so the agent-scan CLI can reach the backend directly.
    # The browser never uses this — it goes through the frontend BFF proxy.
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    volumes:
      - repos_data:/data/repos
    networks:
      - appnet
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      # The BFF proxy (app/api/[...path]) forwards here and injects the key.
      BACKEND_INTERNAL_URL: http://backend:8000
      API_KEY: ${API_KEY:-changeme}
      NODE_ENV: production
    networks:
      - appnet
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet
    depends_on:
      - frontend

  # agent-scan CLI — a one-off tool, not a long-running service, so it is
  # behind the "cli" profile and is NOT started by `docker compose up`.
  # Run it on demand:
  #   docker compose run --rm cli scan https://github.com/octocat/Hello-World
  #   docker compose run --rm cli            # interactive menu
  # Reports land in ./cli/reports on the host.
  cli:
    build:
      context: ./cli
    profiles:
      - cli
    environment:
      # Reaches the backend over the compose network.
      SCAN_API_URL: http://backend:8000
      SCAN_API_KEY: ${API_KEY:-changeme}
    volumes:
      - ./cli/reports:/reports
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  # Cloned repositories live here; the stub never reads them, but
  # /scan/start still performs a real git clone before queuing the scan.
  repos_data:
